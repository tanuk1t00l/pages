<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>링크 모음</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a}

.nav-wrap{position:fixed;top:1rem;right:1.25rem;z-index:200;display:flex;align-items:flex-start;gap:6px}
.nav{display:flex;align-items:center;gap:4px;background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:5px 8px;flex-wrap:wrap;max-width:420px}
.nav-item{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;border:none;background:transparent;color:#666;font-size:13px;cursor:pointer;white-space:nowrap;text-decoration:none;transition:background 0.15s,color 0.15s;font-family:inherit}
.nav-item:hover,.nav-item.active{background:#f0f0ee;color:#1a1a1a}
.nav-item i{font-size:14px}
.nav-sep{width:0.5px;height:18px;background:rgba(0,0,0,0.12);margin:0 2px;flex-shrink:0}

.side-btns{display:flex;flex-direction:column;gap:2px;align-items:center}
.side-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:transparent;color:#aaa;border-radius:6px;transition:background 0.15s,color 0.15s;padding:0;font-size:13px}
.side-btn:hover{background:#ebebea;color:#666}

.home-view{position:absolute;inset:0;overflow-y:auto;padding:5rem 1.5rem 4rem;display:flex;flex-direction:column;align-items:center}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;width:100%;max-width:680px;margin-top:1rem}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:1rem 1.25rem;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.15s,background 0.15s;position:relative;user-select:none}
.card:hover{border-color:rgba(0,0,0,0.2);background:#fafafa}
.card-icon{width:36px;height:36px;border-radius:8px;background:#eff6ff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-icon i{font-size:18px;color:#3b82f6}
.card-text{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-url{font-size:12px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.card-arrow{font-size:14px;color:#ccc;flex-shrink:0}
.card-actions{display:none;position:absolute;top:8px;right:8px;gap:4px}
.card-actions button{background:#f5f5f3;border:0.5px solid rgba(0,0,0,0.1);border-radius:6px;padding:4px 6px;cursor:pointer;color:#666;font-size:13px;line-height:1}
.card-actions button:hover{background:#ebebea;color:#1a1a1a}
.card-actions .del-btn:hover{color:#e53e3e}
.editing .card:hover .card-actions{display:flex}
.editing .card .card-arrow{display:none}
.drag-over{border-color:#3b82f6!important;background:#eff6ff!important}
.dragging{opacity:0.4}
.edit-hint{font-size:12px;color:#aaa;display:none;width:100%;max-width:680px}
.editing .edit-hint{display:block}

.iframe-view{position:fixed;inset:0;z-index:100;display:none;background:#fff}
.iframe-view.open{display:block}
.iframe-view iframe{width:100%;height:100%;border:none;display:block}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:1.5rem;width:340px;max-width:90vw}
.modal h3{font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:1rem}
.modal label{font-size:13px;color:#666;display:block;margin-bottom:4px;margin-top:12px}
.modal input{width:100%;font-size:14px;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none}
.modal input:focus{border-color:#3b82f6}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end}
.btn-cancel{background:transparent;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:7px 16px;cursor:pointer;font-size:14px;color:#666;font-family:inherit}
.btn-cancel:hover{background:#f5f5f3}
.btn-confirm{background:#eff6ff;border:none;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:14px;color:#2563eb;font-weight:500;font-family:inherit}
.btn-confirm:hover{background:#dbeafe}

@media (prefers-color-scheme: dark){
  html,body{background:#1a1a1a;color:#eee}
  .nav{background:#2a2a2a;border-color:rgba(255,255,255,0.1)}
  .nav-item:hover,.nav-item.active{background:#333;color:#eee}
  .nav-item{color:#999}
  .nav-sep{background:rgba(255,255,255,0.1)}
  .side-btn{color:#555}
  .side-btn:hover{background:#2a2a2a;color:#999}
  .card{background:#232323;border-color:rgba(255,255,255,0.08)}
  .card:hover{background:#2a2a2a;border-color:rgba(255,255,255,0.15)}
  .card-title{color:#eee}
  .card-url{color:#555}
  .card-arrow{color:#444}
  .card-icon{background:#1e3a5f}
  .card-icon i{color:#60a5fa}
  .card-actions button{background:#2a2a2a;border-color:rgba(255,255,255,0.1);color:#999}
  .card-actions button:hover{background:#333;color:#eee}
  .drag-over{border-color:#3b82f6!important;background:#1e3a5f!important}
  .edit-hint{color:#555}
  .modal{background:#232323;border-color:rgba(255,255,255,0.1)}
  .modal h3{color:#eee}
  .modal label{color:#999}
  .modal input{background:#2a2a2a;border-color:rgba(255,255,255,0.1);color:#eee}
  .btn-cancel{border-color:rgba(255,255,255,0.15);color:#999}
  .btn-cancel:hover{background:#2a2a2a}
  .btn-confirm{background:#1e3a5f;color:#60a5fa}
  .btn-confirm:hover{background:#1e4080}
  .iframe-view{background:#1a1a1a}
}
</style>
</head>
<body>

<div class="nav-wrap">
  <nav class="nav" id="nav">
    <span id="navLinks"></span>
  </nav>
  <div class="side-btns">
    <button class="side-btn" id="navAddBtn" title="링크 추가" style="display:none"><i class="ti ti-plus"></i></button>
    <button class="side-btn" id="navEditBtn" title="편집 모드"><i class="ti ti-adjustments-horizontal"></i></button>
    <button class="side-btn" id="navLockBtn" title="잠금"><i class="ti ti-lock-open"></i></button>
  </div>
</div>

<div class="home-view" id="homeView">
  <p class="edit-hint"><i class="ti ti-info-circle" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>드래그하거나 ↑↓ 버튼으로 순서를 바꾸고, 카드에 마우스를 올려 삭제할 수 있어요</p>
  <div class="cards" id="cardsContainer"></div>
</div>

<div class="iframe-view" id="iframeView">
  <iframe id="mainFrame" src="" title="콘텐츠 영역"></iframe>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>링크 추가</h3>
    <label>이름</label>
    <input type="text" id="inputName" placeholder="예: 검수 스케줄러" />
    <label>URL</label>
    <input type="url" id="inputUrl" placeholder="https://..." />
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">취소</button>
      <button class="btn-confirm" id="btnConfirm">추가</button>
    </div>
  </div>
</div>

<script>
const ICONS = ['ti-file-spreadsheet','ti-stack','ti-clock','ti-calendar-check','ti-link','ti-world','ti-tool','ti-star'];
let links = [
  {id:1, name:'엑셀 여러 시트 합치기', url:'https://tanuk1t00l.github.io/combiner/', icon:'ti-file-spreadsheet'},
  {id:2, name:'엑셀 통파일 합치기', url:'https://tanuk1t00l.github.io/merger/', icon:'ti-stack'},
  {id:3, name:'이번 주 근무시간', url:'https://tanuk1t00l.github.io/workhour/', icon:'ti-clock'},
  {id:4, name:'검수 스케줄러', url:'https://tanuk1t00l.github.io/scheduler/', icon:'ti-calendar-check'},
];
let nextId=10, isEditing=false, isLocked=false, dragSrc=null, activeId=null;

const cardsContainer=document.getElementById('cardsContainer');
const navLinksEl=document.getElementById('navLinks');
const iframeView=document.getElementById('iframeView');
const mainFrame=document.getElementById('mainFrame');
const homeView=document.getElementById('homeView');
const modalBg=document.getElementById('modalBg');
const inputName=document.getElementById('inputName');
const inputUrl=document.getElementById('inputUrl');
const navAddBtn=document.getElementById('navAddBtn');
const navEditBtn=document.getElementById('navEditBtn');
const navLockBtn=document.getElementById('navLockBtn');

function openLink(lk){
  if(isEditing) return;
  activeId=lk.id;
  mainFrame.src=lk.url;
  iframeView.classList.add('open');
  renderNav();
}
function goHome(){
  activeId=null;
  iframeView.classList.remove('open');
  mainFrame.src='';
  renderNav();
}
function renderNav(){
  navLinksEl.innerHTML='';
  if(activeId!==null){
    const h=document.createElement('button');
    h.className='nav-item';
    h.innerHTML='<i class="ti ti-home"></i>홈';
    h.onclick=goHome;
    navLinksEl.appendChild(h);
    const s=document.createElement('div');
    s.className='nav-sep';
    navLinksEl.appendChild(s);
  }
  links.forEach(lk=>{
    const btn=document.createElement('button');
    btn.className='nav-item'+(lk.id===activeId?' active':'');
    btn.innerHTML=`<i class="ti ${lk.icon}"></i>${lk.name}`;
    btn.onclick=()=>openLink(lk);
    navLinksEl.appendChild(btn);
  });
  navAddBtn.style.display=(!isLocked&&isEditing)?'':'none';
  navEditBtn.style.display=isLocked?'none':'';
  navEditBtn.innerHTML=isEditing?'<i class="ti ti-check"></i>':'<i class="ti ti-adjustments-horizontal"></i>';
  navEditBtn.title=isEditing?'편집 완료':'편집 모드';
  navLockBtn.innerHTML=isLocked?'<i class="ti ti-lock"></i>':'<i class="ti ti-lock-open"></i>';
  navLockBtn.title=isLocked?'잠금 해제':'잠금';
}
function renderCards(){
  cardsContainer.innerHTML='';
  links.forEach((lk,idx)=>{
    const card=document.createElement('div');
    card.className='card';
    card.draggable=isEditing&&!isLocked;
    card.innerHTML=`
      <div class="card-icon"><i class="ti ${lk.icon}"></i></div>
      <div class="card-text">
        <div class="card-title">${lk.name}</div>
        <div class="card-url">${lk.url}</div>
      </div>
      <i class="ti ti-arrow-right card-arrow"></i>
      <div class="card-actions">
        <button class="move-up" data-i="${idx}"><i class="ti ti-chevron-up"></i></button>
        <button class="move-down" data-i="${idx}"><i class="ti ti-chevron-down"></i></button>
        <button class="del-btn" data-i="${idx}"><i class="ti ti-trash"></i></button>
      </div>`;
    if(!isEditing) card.onclick=()=>openLink(lk);
    card.addEventListener('dragstart',e=>{dragSrc=idx;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));});
    card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{e.preventDefault();card.classList.remove('drag-over');if(dragSrc===null||dragSrc===idx)return;const m=links.splice(dragSrc,1)[0];links.splice(idx,0,m);render();});
    cardsContainer.appendChild(card);
  });
  cardsContainer.querySelectorAll('.move-up').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const i=+btn.dataset.i;if(i>0){[links[i-1],links[i]]=[links[i],links[i-1]];render();}}));
  cardsContainer.querySelectorAll('.move-down').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const i=+btn.dataset.i;if(i<links.length-1){[links[i],links[i+1]]=[links[i+1],links[i]];render();}}));
  cardsContainer.querySelectorAll('.del-btn').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();links.splice(+btn.dataset.i,1);render();}));
  if(isEditing) homeView.classList.add('editing'); else homeView.classList.remove('editing');
}
function render(){renderCards();renderNav();}

navEditBtn.onclick=()=>{if(isLocked)return;isEditing=!isEditing;if(isEditing)goHome();render();};
navLockBtn.onclick=()=>{isLocked=!isLocked;if(isLocked)isEditing=false;render();};
navAddBtn.onclick=()=>{inputName.value='';inputUrl.value='';modalBg.classList.add('open');inputName.focus();};
document.getElementById('btnCancel').onclick=()=>modalBg.classList.remove('open');
modalBg.onclick=e=>{if(e.target===modalBg)modalBg.classList.remove('open');};
document.getElementById('btnConfirm').onclick=()=>{
  const name=inputName.value.trim(),url=inputUrl.value.trim();
  if(!name||!url)return;
  links.push({id:nextId++,name,url,icon:ICONS[links.length%ICONS.length]});
  modalBg.classList.remove('open');
  render();
};
inputUrl.onkeydown=e=>{if(e.key==='Enter')document.getElementById('btnConfirm').click();};

render();
</script>
</body>
</html>
